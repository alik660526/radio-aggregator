<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Radio Player Classic</title>
    <style>
        body { font-family: sans-serif; background: #f0f0f0; padding: 20px; text-align: center; }
        .player-box { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); display: inline-block; width: 320px; }
        
        /* Кнопка */
        #play-btn { width: 100%; padding: 15px; font-size: 18px; cursor: pointer; background: #007bff; color: white; border: none; border-radius: 5px; margin-bottom: 20px; }
        #play-btn.playing { background: #dc3545; }

        /* Большая шкала громкости */
        .vol-container { margin-top: 10px; }
        #volume-control { width: 100%; height: 30px; cursor: pointer; }
        
        /* Список станций */
        #station-select { width: 100%; padding: 10px; margin-bottom: 15px; border-radius: 5px; }
        
        .info { margin-top: 10px; color: #666; font-size: 14px; }
    </style>
</head>
<body>

<div class="player-box">
    <h3>Радио Агрегатор</h3>
    
    <select id="station-select">
        <option value="">Выберите станцию...</option>
    </select>

    <button id="play-btn">ПУСК</button>

    <div class="vol-container">
        <label>Громкость</label><br>
        <input type="range" id="volume-control" min="0" max="1" step="0.01" value="0.5">
    </div>

    <div class="info" id="status-display">Готов к работе</div>
</div>

<audio id="main-audio"></audio>

<script>
    const audio = document.getElementById('main-audio');
    const playBtn = document.getElementById('play-btn');
    const volInput = document.getElementById('volume-control');
    const select = document.getElementById('station-select');
    const status = document.getElementById('status-display');

    let stations = [];

    // Загружаем ваш JSON
    fetch('stations.json')
        .then(res => res.json())
        .then(data => {
            stations = data;
            stations.forEach((s, i) => {
                let opt = document.createElement('option');
                opt.value = i;
                opt.textContent = s.name;
                select.appendChild(opt);
            });
        })
        .catch(() => status.textContent = "Ошибка загрузки списка");

    // Начальная громкость 50%
    audio.volume = 0.5;

    playBtn.addEventListener('click', () => {
        const id = select.value;
        if (id === "") return alert("Выберите радиостанцию");

        if (audio.paused) {
            audio.src = stations[id].url;
            audio.play();
            playBtn.textContent = "СТОП";
            playBtn.classList.add('playing');
            status.textContent = "Играет: " + stations[id].name;
        } else {
            audio.pause();
            audio.src = "";
            playBtn.textContent = "ПУСК";
            playBtn.classList.remove('playing');
            status.textContent = "Пауза";
        }
    });

    volInput.addEventListener('input', (e) => {
        audio.volume = e.target.value;
    });
</script>

</body>
</html>
